services:
  db:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-uptimemonitoring}

  web:
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-uptimemonitoring}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-uptimemonitoring}
      APP_URL: ${APP_URL:?Set APP_URL in .env}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env}
      APP_ENCRYPTION_SECRET: ${APP_ENCRYPTION_SECRET:?Set APP_ENCRYPTION_SECRET in .env}

  worker:
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-uptimemonitoring}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-uptimemonitoring}
      APP_URL: ${APP_URL:?Set APP_URL in .env}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env}
      APP_ENCRYPTION_SECRET: ${APP_ENCRYPTION_SECRET:?Set APP_ENCRYPTION_SECRET in .env}
