x-app-build: &app-build
  context: .
  dockerfile_inline: |
    FROM node:20-bookworm-slim

    WORKDIR /app

    RUN apt-get update && apt-get install -y iputils-ping && rm -rf /var/lib/apt/lists/*

    COPY package.json package-lock.json ./
    RUN npm ci
    RUN npx playwright install --with-deps chromium

    COPY . .

    RUN npm run build

    EXPOSE 3000

    CMD ["npm", "run", "start"]

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-uptimemonitoring}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-uptimemonitoring}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: *app-build
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-uptimemonitoring}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-uptimemonitoring}
      APP_URL: ${APP_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:-local-docker-auth-secret-please-change-before-public-deploy-2026}
      APP_ENCRYPTION_SECRET: ${APP_ENCRYPTION_SECRET:-local-docker-encryption-secret-change-before-public-deploy-2026}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-20}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-10000}
      DISABLE_EMBEDDED_WORKER_SPAWN: "true"
    ports:
      - "3000:3000"
    command: npm run docker:web
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  worker:
    build: *app-build
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-uptimemonitoring}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-uptimemonitoring}
      APP_URL: ${APP_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:-local-docker-auth-secret-please-change-before-public-deploy-2026}
      APP_ENCRYPTION_SECRET: ${APP_ENCRYPTION_SECRET:-local-docker-encryption-secret-change-before-public-deploy-2026}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-20}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-10000}
      WORKER_AUTO_START: "true"
    command: npm run docker:worker

volumes:
  pgdata:
